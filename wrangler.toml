name = "kairos-relay"
main = "worker.js"
compatibility_date = "2024-11-01"

# Durable Objects — one instance per room, holds publisher + viewer sockets.
[durable_objects]
bindings = [
  { name = "RELAY_ROOM", class_name = "RelayRoom" }
]

[[migrations]]
tag = "v1"
new_classes = ["RelayRoom"]

# PUBLISH_SECRET and RESEND_API_KEY are set via:
#   wrangler secret put PUBLISH_SECRET
#   wrangler secret put RESEND_API_KEY   (optional — enables motion-alert emails)
