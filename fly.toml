app = "kairos-relay"
primary_region = "fra"  # Frankfurt — change to: iad (US East), lax (US West), sin (Singapore)

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false   # keep alive — relay must never sleep
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
